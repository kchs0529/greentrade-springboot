<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('비밀번호 찾기')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm" style="width: 420px;">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-4">비밀번호 찾기</h4>
            <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
            <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
            <p class="text-muted small">아이디를 입력하시면 가입한 이메일로 임시 비밀번호를 전송해 드립니다.</p>
            <form th:action="@{/find-password}" method="post">
                <div class="mb-3">
                    <label class="form-label">아이디</label>
                    <input type="text" name="user_id" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">임시 비밀번호 전송</button>
            </form>
            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-muted text-decoration-none small">로그인으로 돌아가기</a>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
