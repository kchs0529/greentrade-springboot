<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('회원가입')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4">회원가입</h4>
                    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
                    <form th:action="@{/join}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">이름 *</label>
                            <input type="text" name="user_name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">아이디 *</label>
                            <div class="input-group">
                                <input type="text" id="user_id" name="user_id" class="form-control" required>
                                <button type="button" class="btn btn-outline-secondary" onclick="checkId()">중복확인</button>
                            </div>
                            <div id="idCheckMsg" class="form-text"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">비밀번호 *</label>
                            <input type="password" name="user_password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">닉네임 *</label>
                            <input type="text" name="nickname" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">이메일 *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">전화번호 *</label>
                            <input type="text" name="user_call" class="form-control" placeholder="010-0000-0000" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">주소</label>
                            <input type="text" name="address1" class="form-control mb-2" placeholder="기본 주소">
                            <input type="text" name="address2" class="form-control mb-2" placeholder="상세 주소">
                            <input type="text" name="postnum" class="form-control" placeholder="우편번호">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">프로필 이미지</label>
                            <input type="file" name="imgurl" class="form-control" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-success w-100">가입하기</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function checkId() {
    const userId = document.getElementById('user_id').value;
    if (!userId) { alert('아이디를 입력해주세요.'); return; }
    fetch('/join/check-id?userId=' + encodeURIComponent(userId))
        .then(r => r.text())
        .then(result => {
            const msg = document.getElementById('idCheckMsg');
            if (result === 'duplicate') {
                msg.className = 'form-text text-danger';
                msg.textContent = '이미 사용 중인 아이디입니다.';
            } else {
                msg.className = 'form-text text-success';
                msg.textContent = '사용 가능한 아이디입니다.';
            }
        });
}
</script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
