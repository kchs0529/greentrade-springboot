<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('정보 수정')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h5 class="fw-bold mb-4">정보 수정</h5>
            <form th:action="@{/mypage/edit}" method="post" enctype="multipart/form-data">
                <div class="text-center mb-3">
                    <img th:if="${user.imgurl != null}"
                         th:src="@{/uploads/{img}(img=${user.imgurl})}"
                         class="rounded-circle mb-2" width="100" height="100" style="object-fit:cover;" alt="프로필">
                    <div>
                        <input type="file" name="profileImage" class="form-control" accept="image/*">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">이메일</label>
                    <input type="email" name="email" class="form-control" th:value="${user.email}">
                </div>
                <div class="mb-3">
                    <label class="form-label">전화번호</label>
                    <input type="text" name="user_call" class="form-control" th:value="${user.user_call}">
                </div>
                <div class="mb-3">
                    <label class="form-label">주소</label>
                    <input type="text" name="address1" class="form-control mb-2" th:value="${user.address1}" placeholder="기본 주소">
                    <input type="text" name="address2" class="form-control" th:value="${user.address2}" placeholder="상세 주소">
                </div>
                <button type="submit" class="btn btn-success w-100">수정 완료</button>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
