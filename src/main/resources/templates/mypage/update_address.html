<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('배송지 수정')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h5 class="fw-bold mb-4">배송지 수정</h5>
            <form th:action="@{/address/update}" method="post">
                <div class="mb-3">
                    <label class="form-label">받는 분</label>
                    <input type="text" name="receivername" class="form-control"
                           th:value="${address != null ? address.receivername : ''}">
                </div>
                <div class="mb-3">
                    <label class="form-label">전화번호</label>
                    <input type="text" name="phone" class="form-control"
                           th:value="${address != null ? address.phone : ''}">
                </div>
                <div class="mb-3">
                    <label class="form-label">기본 주소</label>
                    <input type="text" name="address1" class="form-control"
                           th:value="${address != null ? address.address1 : ''}">
                </div>
                <div class="mb-3">
                    <label class="form-label">상세 주소</label>
                    <input type="text" name="address2" class="form-control"
                           th:value="${address != null ? address.address2 : ''}">
                </div>
                <div class="mb-3">
                    <label class="form-label">우편번호</label>
                    <input type="text" name="postnum" class="form-control"
                           th:value="${address != null ? address.postnum : ''}">
                </div>
                <button type="submit" class="btn btn-success w-100">저장</button>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
