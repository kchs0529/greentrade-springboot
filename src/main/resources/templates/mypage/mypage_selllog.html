<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('판매 내역')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4">
    <h5 class="fw-bold mb-3">판매 내역</h5>

    <div th:if="${sellLogs == null or sellLogs.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-bag display-4"></i>
        <p class="mt-3">판매 내역이 없습니다.</p>
    </div>

    <div class="list-group" th:unless="${sellLogs == null or sellLogs.isEmpty()}">
        <div class="list-group-item list-group-item-action" th:each="log : ${sellLogs}">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-1 fw-bold" th:text="${log.title}">상품명</h6>
                    <small class="text-muted">
                        <span th:text="${log.price + '원'}">0원</span> |
                        <span th:text="${log.paymethod}">결제</span> |
                        <span th:text="${log.trademethod}">거래</span> |
                        <span th:text="${log.tradestartdate}">날짜</span>
                    </small>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="badge" th:classappend="${log.tradestatus == '거래완료' ? 'bg-success' : 'bg-warning text-dark'}"
                          th:text="${log.tradestatus}">상태</span>
                    <button class="btn btn-outline-danger btn-sm"
                            th:attr="data-productno=${log.productno}"
                            onclick="deleteSellItem(this)">삭제</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function deleteSellItem(btn) {
    if (!confirm('삭제하시겠습니까?')) return;
    const productno = btn.getAttribute('data-productno');
    fetch('/mypage/selllog/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'productno=' + productno
    }).then(() => location.reload());
}
</script>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
