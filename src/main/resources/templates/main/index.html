<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('홈')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container-fluid p-0">
    <!-- 히어로 배너 -->
    <div id="heroBanner" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <div class="d-flex justify-content-center align-items-center text-white"
                     style="height: 300px; background: linear-gradient(135deg, #2d8653, #52c47a);">
                    <div class="text-center">
                        <h1 class="display-5 fw-bold">친환경 중고거래</h1>
                        <p class="lead">지구를 위한 현명한 소비, GreenTrade</p>
                        <a th:href="@{/product/list}" class="btn btn-light btn-lg mt-2">
                            <i class="bi bi-bag-heart"></i> 쇼핑 시작하기
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5">
    <!-- 최신 상품 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold">최신 상품 <span class="badge bg-success fs-6">NEW</span></h4>
        <a th:href="@{/product/list}" class="btn btn-outline-success btn-sm">전체보기 &rarr;</a>
    </div>
    <div class="row row-cols-2 row-cols-md-4 g-3 mb-5">
        <div class="col" th:each="item : ${recentItems}">
            <a th:href="@{/product/detail/{no}(no=${item.productno})}" class="text-decoration-none text-dark">
                <div class="card h-100 border-0 shadow-sm product-card">
                    <img th:if="${item.image != null and !item.image.isEmpty()}"
                         th:src="@{/uploads/{img}(img=${item.image})}"
                         class="card-img-top" style="height:180px; object-fit:cover;" alt="상품이미지">
                    <img th:unless="${item.image != null and !item.image.isEmpty()}"
                         th:src="@{/img/defaultprofile.png}"
                         class="card-img-top" style="height:180px; object-fit:cover;" alt="기본이미지">
                    <div class="card-body p-2">
                        <p class="card-text fw-semibold mb-1 text-truncate" th:text="${item.title}">상품명</p>
                        <p class="card-text text-success fw-bold mb-1"
                           th:text="${item.paymethod == '나눔' ? '나눔' : item.price + '원'}">가격</p>
                        <small class="text-muted" th:text="${item.trademethod}">거래방법</small>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- 인기 상품 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold">인기 상품 <span class="badge bg-danger fs-6">HOT</span></h4>
        <a th:href="@{/product/best}" class="btn btn-outline-danger btn-sm">전체보기 &rarr;</a>
    </div>
    <div class="row row-cols-2 row-cols-md-4 g-3 mb-5">
        <div class="col" th:each="item : ${bestItems}">
            <a th:href="@{/product/detail/{no}(no=${item.productno})}" class="text-decoration-none text-dark">
                <div class="card h-100 border-0 shadow-sm product-card">
                    <img th:if="${item.image != null and !item.image.isEmpty()}"
                         th:src="@{/uploads/{img}(img=${item.image})}"
                         class="card-img-top" style="height:180px; object-fit:cover;" alt="상품이미지">
                    <img th:unless="${item.image != null and !item.image.isEmpty()}"
                         th:src="@{/img/defaultprofile.png}"
                         class="card-img-top" style="height:180px; object-fit:cover;" alt="기본이미지">
                    <div class="card-body p-2">
                        <p class="card-text fw-semibold mb-1 text-truncate" th:text="${item.title}">상품명</p>
                        <p class="card-text text-success fw-bold mb-1"
                           th:text="${item.paymethod == '나눔' ? '나눔' : item.price + '원'}">가격</p>
                        <small class="text-muted"><i class="bi bi-eye"></i> <span th:text="${item.viewcount}">0</span></small>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
