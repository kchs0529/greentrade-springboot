<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('관리자')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-4">
    <h5 class="fw-bold mb-4">관리자 페이지</h5>
    <div class="row g-3">
        <div class="col-md-4">
            <a th:href="@{/manager/members}" class="text-decoration-none">
                <div class="card text-center border-0 shadow-sm">
                    <div class="card-body p-4">
                        <i class="bi bi-people display-4 text-primary"></i>
                        <h5 class="mt-2">회원 관리</h5>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/manager/products}" class="text-decoration-none">
                <div class="card text-center border-0 shadow-sm">
                    <div class="card-body p-4">
                        <i class="bi bi-box display-4 text-success"></i>
                        <h5 class="mt-2">상품 관리</h5>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/manager/reports}" class="text-decoration-none">
                <div class="card text-center border-0 shadow-sm">
                    <div class="card-body p-4">
                        <i class="bi bi-flag display-4 text-danger"></i>
                        <h5 class="mt-2">신고 관리</h5>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
