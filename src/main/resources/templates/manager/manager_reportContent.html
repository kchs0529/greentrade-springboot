<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('신고 상세')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <h5 class="fw-bold mb-4">신고 상세</h5>
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <table class="table table-sm">
                        <tr><th class="text-muted">신고 번호</th><td th:text="${report.reportid}"></td></tr>
                        <tr><th class="text-muted">제목</th><td th:text="${report.reporttitle}"></td></tr>
                        <tr><th class="text-muted">신고자</th><td th:text="${report.reporterNickname}"></td></tr>
                        <tr><th class="text-muted">피신고자</th><td th:text="${report.targetNickname}"></td></tr>
                        <tr><th class="text-muted">신고일</th><td th:text="${report.reportdate}"></td></tr>
                        <tr><th class="text-muted">내용</th><td th:text="${report.reportcontent}"></td></tr>
                    </table>
                    <div th:if="${report.reportimgurl != null and !report.reportimgurl.isEmpty()}">
                        <img th:src="${report.reportimgurl}" class="img-fluid rounded" alt="증거이미지">
                    </div>
                </div>
            </div>
            <div class="mt-3">
                <a th:href="@{/manager/reports}" class="btn btn-outline-secondary btn-sm">목록으로</a>
                <a th:href="@{/manager/reports/user/{no}(no=${report.targetid})}"
                   class="btn btn-danger btn-sm ms-2">피신고자 신고 내역</a>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
