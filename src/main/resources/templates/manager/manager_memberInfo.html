<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('회원 정보')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h5 class="fw-bold mb-4">회원 상세 정보</h5>
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="text-center mb-3">
                        <img th:if="${member.imgurl != null}"
                             th:src="@{/uploads/{img}(img=${member.imgurl})}"
                             class="rounded-circle" width="80" height="80" style="object-fit:cover;" alt="">
                    </div>
                    <table class="table table-sm">
                        <tr><th class="text-muted">아이디</th><td th:text="${member.user_id}"></td></tr>
                        <tr><th class="text-muted">이름</th><td th:text="${member.user_name}"></td></tr>
                        <tr><th class="text-muted">이메일</th><td th:text="${member.email}"></td></tr>
                        <tr><th class="text-muted">전화번호</th><td th:text="${member.user_call}"></td></tr>
                        <tr><th class="text-muted">주소</th><td th:text="${member.address1 + ' ' + (member.address2 ?: '')}"></td></tr>
                    </table>
                    <div class="d-flex gap-2">
                        <a th:href="@{/manager/members}" class="btn btn-outline-secondary btn-sm">목록</a>
                        <form th:action="@{/manager/members/delete}" method="post"
                              onsubmit="return confirm('정말 삭제하시겠습니까?')">
                            <input type="hidden" name="userId" th:value="${member.user_id}">
                            <input type="hidden" name="userno" th:value="${member.userno}">
                            <button type="submit" class="btn btn-danger btn-sm">회원 삭제</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
