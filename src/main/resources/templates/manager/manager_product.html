<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('상품 관리')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-4">
    <h5 class="fw-bold mb-3">상품 관리</h5>
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>번호</th><th>제목</th><th>가격</th><th>판매자</th><th>상태</th><th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.productno}"></td>
                <td>
                    <a th:href="@{/product/detail/{no}(no=${product.productno})}"
                       th:text="${product.title}" class="text-decoration-none"></a>
                </td>
                <td th:text="${product.paymethod == '나눔' ? '나눔' : product.price + '원'}"></td>
                <td th:text="${product.user_name}"></td>
                <td>
                    <span class="badge" th:classappend="${product.sellstatus == '판매중' ? 'bg-success' : 'bg-secondary'}"
                          th:text="${product.sellstatus}"></span>
                </td>
                <td>
                    <form th:action="@{/manager/products/delete}" method="post" class="d-inline"
                          onsubmit="return confirm('정말 삭제하시겠습니까?')">
                        <input type="hidden" name="productno" th:value="${product.productno}">
                        <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/manager/products(page=${currentPage - 1})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == currentPage ? 'active' : ''}">
                <a class="page-link" th:href="@{/manager/products(page=${i})}" th:text="${i}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/manager/products(page=${currentPage + 1})}">다음</a>
            </li>
        </ul>
    </nav>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
