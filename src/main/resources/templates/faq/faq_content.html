<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('FAQ 상세')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-4">
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between mb-2">
                <span class="badge bg-secondary" th:text="${faq.faqcate}">카테고리</span>
                <small class="text-muted" th:text="${faq.faqdate}">날짜</small>
            </div>
            <h5 class="fw-bold" th:text="${faq.faqtitle}">제목</h5>
            <hr>
            <p th:text="${faq.faqcontent}">내용</p>
        </div>
    </div>
    <div class="mt-3">
        <a th:href="@{/faq}" class="btn btn-outline-secondary btn-sm">목록으로</a>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
