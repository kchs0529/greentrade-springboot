<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('FAQ 작성')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <h5 class="fw-bold mb-4">FAQ 작성</h5>
            <form th:action="@{/faq/write}" method="post">
                <div class="mb-3">
                    <label class="form-label">카테고리</label>
                    <select name="faqcate" class="form-select">
                        <option value="거래">거래</option>
                        <option value="배송">배송</option>
                        <option value="결제">결제</option>
                        <option value="계정">계정</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">제목</label>
                    <input type="text" name="faqtitle" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">내용</label>
                    <textarea name="faqcontent" class="form-control" rows="6" required></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">등록</button>
                    <a th:href="@{/faq}" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
