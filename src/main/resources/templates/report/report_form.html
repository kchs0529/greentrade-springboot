<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('신고')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h5 class="fw-bold mb-4">사용자 신고</h5>
            <form th:action="@{/report/submit}" method="post">
                <input type="hidden" name="targetid" th:value="${targetUserno}">
                <div class="mb-3">
                    <label class="form-label">신고 대상 닉네임</label>
                    <input type="text" name="targetNickname" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">신고 제목</label>
                    <input type="text" name="reporttitle" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">신고 내용</label>
                    <textarea name="reportcontent" class="form-control" rows="5" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">증거 이미지 URL</label>
                    <input type="text" name="reportimgurl" class="form-control">
                </div>
                <button type="submit" class="btn btn-danger w-100">신고하기</button>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
