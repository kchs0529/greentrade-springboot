<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('결제')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h5 class="fw-bold mb-4">결제하기</h5>

            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <h6 class="fw-bold">상품 정보</h6>
                    <table class="table table-sm">
                        <tr><th class="text-muted">상품명</th><td th:text="${product.title}"></td></tr>
                        <tr><th class="text-muted">가격</th><td class="text-success fw-bold" th:text="${product.price + '원'}"></td></tr>
                        <tr><th class="text-muted">결제방법</th><td th:text="${product.paymethod}"></td></tr>
                        <tr><th class="text-muted">거래방법</th><td th:text="${product.trademethod}"></td></tr>
                    </table>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <h6 class="fw-bold">배송지 정보</h6>
                    <table class="table table-sm">
                        <tr><th class="text-muted">받는 분</th><td th:text="${buyer.user_name}"></td></tr>
                        <tr><th class="text-muted">전화번호</th><td th:text="${buyer.user_call}"></td></tr>
                        <tr><th class="text-muted">주소</th><td th:text="${buyer.address1 + ' ' + (buyer.address2 ?: '')}"></td></tr>
                    </table>
                </div>
            </div>

            <button id="payment-btn" class="btn btn-warning w-100 fw-bold py-2">
                <i class="bi bi-credit-card"></i> 결제하기
            </button>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://js.tosspayments.com/v1/payment"></script>
<script th:inline="javascript">
    const clientKey = "test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq";
    const amount    = /*[[${product.price}]]*/ 0;
    const orderName = /*[[${product.title}]]*/ "";
    const customerName = /*[[${buyer.user_name}]]*/ "";
    const productno = /*[[${product.productno}]]*/ 0;

    const tossPayments = TossPayments(clientKey);

    document.getElementById("payment-btn").addEventListener("click", function () {
        const orderId = "order-" + Date.now() + "-" + Math.floor(Math.random() * 100000);
        tossPayments.requestPayment("카드", {
            amount: amount,
            orderId: orderId,
            orderName: orderName,
            customerName: customerName,
            successUrl: window.location.origin + "/pay/success?productno=" + productno,
            failUrl:    window.location.origin + "/pay/fail"
        });
    });
</script>
</body>
</html>
