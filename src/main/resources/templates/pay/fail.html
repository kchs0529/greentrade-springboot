<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('결제 실패')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <i class="bi bi-x-circle-fill text-danger" style="font-size: 3rem;"></i>
            <h5 class="fw-bold mt-3 mb-2">결제에 실패했습니다</h5>
            <p class="text-muted" th:text="${message} ?: '결제 중 오류가 발생했습니다.'"></p>
            <p class="text-muted small" th:if="${code}" th:text="'오류코드: ' + ${code}"></p>
            <a href="javascript:history.back()" class="btn btn-outline-secondary mt-3">돌아가기</a>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
