<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('검색 결과')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4">
    <h5 class="mb-4">
        "<strong th:text="${keyword}"></strong>" 검색 결과
        <span class="text-muted fs-6 fw-normal" th:if="${products != null}">
            (총 <span th:text="${products.size()}">0</span>건)
        </span>
    </h5>

    <div th:if="${products == null or products.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-search display-4"></i>
        <p class="mt-3">검색 결과가 없습니다.</p>
    </div>

    <div class="row row-cols-2 row-cols-md-4 g-3">
        <div class="col" th:each="item : ${products}">
            <a th:href="@{/product/detail/{no}(no=${item.productno})}" class="text-decoration-none text-dark">
                <div class="card h-100 border-0 shadow-sm product-card">
                    <img th:if="${item.image != null and !item.image.isEmpty()}"
                         th:src="@{/uploads/{img}(img=${item.image})}"
                         class="card-img-top" style="height:180px; object-fit:cover;" alt="">
                    <img th:unless="${item.image != null and !item.image.isEmpty()}"
                         th:src="@{/img/defaultprofile.png}"
                         class="card-img-top" style="height:180px; object-fit:cover;" alt="">
                    <div class="card-body p-2">
                        <p class="card-text fw-semibold mb-1 text-truncate" th:text="${item.title}">상품명</p>
                        <p class="card-text text-success fw-bold mb-0"
                           th:text="${item.paymethod == '나눔' ? '나눔' : item.price + '원'}">가격</p>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- 페이징 -->
    <nav class="mt-4" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/search(keyword=${keyword}, page=${currentPage - 1})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == currentPage ? 'active' : ''}">
                <a class="page-link" th:href="@{/search(keyword=${keyword}, page=${i})}" th:text="${i}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/search(keyword=${keyword}, page=${currentPage + 1})}">다음</a>
            </li>
        </ul>
    </nav>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
