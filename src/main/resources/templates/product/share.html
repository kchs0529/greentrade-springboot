<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('나눔 상품')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container py-4">
    <h4 class="fw-bold mb-4">나눔 상품 <span class="badge bg-success">FREE</span></h4>
    <div class="row row-cols-2 row-cols-md-4 g-3">
        <div class="col" th:each="item : ${products}">
            <a th:href="@{/product/detail/{no}(no=${item.productno})}" class="text-decoration-none text-dark">
                <div class="card h-100 border-0 shadow-sm product-card">
                    <img th:if="${item.image != null and !item.image.isEmpty()}"
                         th:src="@{/uploads/{img}(img=${item.image})}"
                         class="card-img-top" style="height:180px; object-fit:cover;" alt="">
                    <img th:unless="${item.image != null and !item.image.isEmpty()}"
                         th:src="@{/img/defaultprofile.png}"
                         class="card-img-top" style="height:180px; object-fit:cover;" alt="">
                    <div class="card-body p-2">
                        <p class="card-text fw-semibold mb-1 text-truncate" th:text="${item.title}">상품명</p>
                        <p class="card-text text-success fw-bold">나눔</p>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
