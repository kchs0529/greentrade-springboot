<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('상품 상세')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4">
    <div class="row g-4">
        <!-- 상품 이미지 -->
        <div class="col-md-5">
            <img th:if="${product.image != null and !product.image.isEmpty()}"
                 th:src="@{/uploads/{img}(img=${product.image})}"
                 class="img-fluid rounded shadow-sm w-100" style="max-height: 400px; object-fit: cover;" alt="상품이미지">
            <img th:unless="${product.image != null and !product.image.isEmpty()}"
                 th:src="@{/img/defaultprofile.png}"
                 class="img-fluid rounded shadow-sm w-100" style="max-height: 400px; object-fit: cover;" alt="기본이미지">
        </div>

        <!-- 상품 정보 -->
        <div class="col-md-7">
            <!-- 판매자 정보 -->
            <div class="d-flex align-items-center mb-3">
                <img th:if="${seller != null and seller.imgurl != null}"
                     th:src="@{/uploads/{img}(img=${seller.imgurl})}"
                     class="rounded-circle me-2" width="40" height="40" style="object-fit:cover;" alt="판매자">
                <div>
                    <a th:href="@{/seller/{no}(no=${seller != null ? seller.userno : 0})}"
                       class="fw-bold text-decoration-none text-dark"
                       th:text="${seller != null ? seller.nickname : '판매자'}">판매자</a>
                    <div class="text-muted small">
                        <i class="bi bi-star-fill text-warning"></i>
                        그린스코어 <span th:text="${seller != null ? seller.greenscore : 0}">0</span>
                    </div>
                </div>
            </div>

            <h4 class="fw-bold" th:text="${product.title}">상품명</h4>
            <h3 class="text-success fw-bold"
                th:text="${product.paymethod == '나눔' ? '나눔' : product.price + '원'}">가격</h3>

            <table class="table table-sm mt-3">
                <tr>
                    <th class="text-muted" style="width:120px;">상태</th>
                    <td th:text="${product.productStatus}">상태</td>
                </tr>
                <tr>
                    <th class="text-muted">거래방법</th>
                    <td th:text="${product.trademethod}">거래방법</td>
                </tr>
                <tr>
                    <th class="text-muted">결제방법</th>
                    <td th:text="${product.paymethod}">결제방법</td>
                </tr>
                <tr th:if="${product.tradelocation != null}">
                    <th class="text-muted">거래장소</th>
                    <td th:text="${product.tradelocation}">장소</td>
                </tr>
                <tr>
                    <th class="text-muted">조회수</th>
                    <td th:text="${product.viewcount}">0</td>
                </tr>
            </table>

            <p class="mt-3" th:text="${product.productDetail}">상품 설명</p>

            <!-- 버튼 -->
            <div class="d-flex gap-2 mt-3">
                <!-- 찜하기 (로그인 필요) -->
                <button id="heartBtn" class="btn btn-outline-danger"
                        sec:authorize="isAuthenticated()"
                        th:classappend="${heartStatus == 1 ? 'active' : ''}"
                        th:attr="data-productno=${product.productno}">
                    <i class="bi" th:classappend="${heartStatus == 1 ? 'bi-heart-fill' : 'bi-heart'}"></i>
                    찜하기
                </button>
                <!-- 채팅 (로그인 필요) -->
                <a sec:authorize="isAuthenticated()"
                   th:href="@{/chat(productno=${product.productno})}" class="btn btn-success">
                    <i class="bi bi-chat-dots"></i> 채팅하기
                </a>
                <!-- 구매 (비로그인 시 로그인 페이지로, 로그인 후 구매 페이지로 복귀) -->
                <a th:if="${product.sellstatus == '판매중'}"
                   th:href="@{/pay(productno=${product.productno})}" class="btn btn-warning">
                    <i class="bi bi-credit-card"></i> 바로구매
                </a>
            </div>

            <!-- 신고 -->
            <div class="mt-2" sec:authorize="isAuthenticated()">
                <a th:href="@{/report/form(targetUserno=${seller != null ? seller.userno : 0})}"
                   class="text-muted small text-decoration-none">
                    <i class="bi bi-flag"></i> 신고하기
                </a>
            </div>
        </div>
    </div>

    <!-- 리뷰 -->
    <div class="mt-5" th:if="${reviews != null and !reviews.isEmpty()}">
        <h5 class="fw-bold">판매자 거래 후기</h5>
        <div class="list-group">
            <div class="list-group-item" th:each="review : ${reviews}">
                <span th:text="${review.reviewcontent}">리뷰내용</span>
                <span class="badge bg-secondary ms-2" th:text="${review.content_count + '건'}">0건</span>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
const productno = [[${product.productno}]];
let isHearted = [[${heartStatus == 1}]];

document.getElementById('heartBtn')?.addEventListener('click', function() {
    const url = isHearted ? '/heart/cancel' : '/heart/do';
    fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded',
                  'X-CSRF-TOKEN': document.cookie.match(/XSRF-TOKEN=([^;]+)/)?.[1] || ''},
        body: 'productno=' + productno
    }).then(() => {
        isHearted = !isHearted;
        const icon = this.querySelector('i');
        icon.className = isHearted ? 'bi bi-heart-fill' : 'bi bi-heart';
        this.classList.toggle('active', isHearted);
    });
});
</script>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
