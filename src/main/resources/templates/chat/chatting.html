<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('채팅')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-success text-white fw-bold">
                    <i class="bi bi-chat-dots"></i> 채팅방 #<span th:text="${chatroomId}"></span>
                </div>
                <div class="card-body p-0">
                    <div id="chatBox" style="height: 400px; overflow-y: auto; padding: 16px; background: #f8f9fa;">
                        <!-- 메시지 표시 영역 -->
                    </div>
                </div>
                <div class="card-footer">
                    <div class="input-group">
                        <input type="text" id="msgInput" class="form-control" placeholder="메시지를 입력하세요..."
                               onkeydown="if(event.key==='Enter') sendMsg()">
                        <button class="btn btn-success" onclick="sendMsg()">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
const chatroomId = [[${chatroomId}]];
const myUserno = [[${userno}]];
const wsUrl = 'ws://' + location.host + '/ws/chat/' + chatroomId;
const ws = new WebSocket(wsUrl);
const chatBox = document.getElementById('chatBox');

ws.onmessage = function(e) {
    const data = JSON.parse(e.data);
    const div = document.createElement('div');
    const isMine = data.userno == myUserno;
    div.className = 'd-flex mb-2 ' + (isMine ? 'justify-content-end' : 'justify-content-start');
    div.innerHTML = `<div class="px-3 py-2 rounded-3 ${isMine ? 'bg-success text-white' : 'bg-white border'}"
                         style="max-width:70%;">${data.message}</div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
};

function sendMsg() {
    const input = document.getElementById('msgInput');
    const msg = input.value.trim();
    if (!msg) return;
    ws.send(JSON.stringify({ userno: myUserno, message: msg }));
    input.value = '';
}
</script>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
